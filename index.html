<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cubismo</title>
  <style>
    /* Estilos del encabezado */
    header {
      background-color: #2c3e50; /* fondo */
      padding: 20px;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
      text-align: center;
      letter-spacing: 3px;
      font-family: 'Arial Black', sans-serif;
      color: #ff931e; /* color del logo/título */
    }

    nav {
      margin-top: 15px;
      text-align: center;
    }

    nav a {
      color: #ffffff; /* texto en blanco */
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      font-family: 'Arial', sans-serif;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #ff931e; /* acento al pasar el mouse */
    }
  </style>
</head>
<body>
  <!-- Aquí va tu encabezado nuevo -->
  <header>
    <h1>CUBISMO</h1>
    <nav>
      <a href="#">INICIO</a>
      <a href="#">HISTORIA</a>
      <a href="#">ARTISTAS</a>
      <a href="#">OBRAS</a>
      <a href="#">LEGADO</a>
      <a href="#">INFLUENCIAS</a>
      <a href="#">CONTACTO</a>
    </nav>
  </header>

  <!-- El resto de tu contenido -->
  <main>
    <p>Este es un párrafo de texto...</p>
  </main>

  <footer>
    <p>Este es mi footer.</p>
  </footer>
</body>
</html>
